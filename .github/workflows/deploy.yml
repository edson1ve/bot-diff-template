name: Deploy Trading App

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Deployment environment'
        type: choice
        options:
          - production
          - staging
        default: production

env:
  DOCKER_IMAGE: trading
  DOCKER_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_DERIV_APP_ID: ${{ secrets.TRADING_DERIV_APP_ID }}
          NEXT_PUBLIC_DERIV_REDIRECT_URI: https://${{ secrets.TRADING_DOMAIN }}
          NEXT_PUBLIC_DERIV_APP_NAME: ${{ secrets.TRADING_APP_NAME }}
          NEXT_PUBLIC_DERIV_OAUTH_SCOPES: ${{ secrets.TRADING_DERIV_OAUTH_SCOPES }}
          NEXT_PUBLIC_DERIV_ENV: ${{ secrets.TRADING_DERIV_ENV }}
          NEXT_PUBLIC_FONT_FAMILY: ${{ secrets.TRADING_FONT_FAMILY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next/standalone/
            .next/static/
            public/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: build-output

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.github
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 120s
          script: |
            set -euo pipefail
            cd /opt/docker
            docker pull "${{ secrets.DOCKER_USERNAME }}/trading:latest"
            docker compose -f docker-compose.trading.yml up -d trading
            docker image prune -f
            docker compose -f docker-compose.trading.yml ps
